services:
  crm-db:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_USER: crm_admin
      POSTGRES_PASSWORD: crm_password123
      POSTGRES_DB: crm_db
    ports:
      - "5434:5432" # Ánh xạ ra ngoài cổng 5434 vì VPS đã dùng 5432, 5433
    volumes:
      - crm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  crm-app:
    build: .
    container_name: crm_web
    restart: always
    ports:
      - "5100:3000" # Ánh xạ ra ngoài cổng 5100
    environment:
      # Kết nối tới container DB ở trên
      - DATABASE_URL=postgresql://crm_admin:crm_password123@crm-db:5432/crm_db
      - DIRECT_URL=postgresql://crm_admin:crm_password123@crm-db:5432/crm_db
      - NEXTAUTH_SECRET=autosmart-super-secret-key-2026
      - NEXTAUTH_URL=http://27.71.68.82:5100
      # (Bổ sung thêm các biến ZALO_... của bạn vào đây)
    depends_on:
      crm-db:
        condition: service_healthy

volumes:
  crm_db_data:
