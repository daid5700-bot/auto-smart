name: Auto Deploy to VPS

on:
  push:
    branches:
      - main # Cấu hình nhánh (branch) kích hoạt deploy, đổi lại nếu bạn dùng nhánh master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          port: 2202
          key: ${{ secrets.VPS_SSH_KEY }}
          # Thư mục gốc chứa dự án trên VPS
          script: |
            # 1. Di chuyển vào thư mục dự án trên VPS (hỗ trợ cả tên thư mục mặc định)
            if [ -d "$HOME/auto-smart" ]; then
              cd "$HOME/auto-smart"
            elif [ -d "$HOME/AUTO-SMART CRM & ERP" ]; then
              cd "$HOME/AUTO-SMART CRM & ERP"
            else
              echo "❌ ERROR: Không tìm thấy thư mục dự án trên VPS!"
              echo "Vui lòng kiểm tra lại đường dẫn dự án trên VPS (hoặc đổi tên thư mục thành auto-smart)."
              exit 1
            fi
            
            # 2. Cập nhật mã nguồn mới nhất từ Github
            echo "📥 Đang cập nhật mã nguồn trên VPS..."
            git reset --hard HEAD
            git pull origin main
            
            # 3. Kiểm tra sự tồn tại của file deploy.sh trong thư mục scripts/
            if [ ! -f "./scripts/deploy.sh" ]; then
              echo "❌ ERROR: Không tìm thấy file scripts/deploy.sh trong thư mục dự án!"
              exit 1
            fi
            
            # 4. Cấp quyền thực thi và chạy file deploy tự động
            echo "🚀 Đang chạy file deploy..."
            chmod +x ./scripts/deploy.sh
            ./scripts/deploy.sh
            
            # 5. Xóa các file build cũ/rác của Docker để tránh đầy ổ cứng
            docker image prune -f
