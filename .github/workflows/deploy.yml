name: Auto Deploy to VPS

on:
  push:
    branches:
      - main # Cấu hình nhánh (branch) kích hoạt deploy, đổi lại nếu bạn dùng nhánh master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          port: 2202
          key: ${{ secrets.VPS_SSH_KEY }}
          # Thư mục gốc chứa dự án trên VPS
          script: |
            # 1. Di chuyển vào thư mục dự án trên VPS
            cd ~/auto-smart
            
            # 2. Cấp quyền thực thi và chạy file deploy tự động
            chmod +x ./deploy.sh
            ./deploy.sh
            
            # 3. Xóa các file build cũ/rác của Docker để VPS không bị đầy ổ cứng
            docker image prune -f
