name: Auto Deploy to VPS

on:
  push:
    branches:
      - main # Cấu hình nhánh (branch) kích hoạt deploy, đổi lại nếu bạn dùng nhánh master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Thư mục gốc chứa dự án trên VPS
          script: |
            # 1. Di chuyển vào thư mục dự án trên VPS
            cd ~/auto-smart-crm
            
            # 2. Kéo code mới nhất từ git về
            git pull origin main
            
            # 3. Build lại Docker và khởi động lại ngầm
            sudo docker compose up -d --build
            
            # 4. Xóa các file build cũ/rác của Docker để VPS không bị đầy ổ cứng
            sudo docker image prune -f
